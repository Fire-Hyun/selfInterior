spring.application.name=selfinterior-api
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/selfinterior}
spring.datasource.username=${DB_USERNAME:selfinterior}
spring.datasource.password=${DB_PASSWORD:selfinterior}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
logging.level.root=${LOG_LEVEL:INFO}

app.default-owner-user-id=${DEFAULT_OWNER_USER_ID:11111111-1111-1111-1111-111111111111}
